apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-portal-ui
  labels:
    app.kubernetes.io/name: my-portal-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: telecom-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-portal-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-portal-ui
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: telecom-network
    spec:
      containers:
        - name: my-portal-ui
          image: ghcr.io/arnabdey73/my-portal-ui:latest
          ports:
            - containerPort: 4200
          resources:
            requests:
              cpu: 400m
