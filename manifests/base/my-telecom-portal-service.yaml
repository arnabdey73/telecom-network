apiVersion: v1
kind: Service
metadata:
  name: my-telecom-portal
  labels:
    app.kubernetes.io/name: my-telecom-portal
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: telecom-network
spec:
  type: LoadBalancer
  ports:
    - port: 8181
      targetPort: 8181
      protocol: TCP
  loadBalancerSourceRanges:
    - 0.0.0.0/0
  selector:
    app.kubernetes.io/name: my-telecom-portal
